<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logo Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: #fff; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .logo-box { background: #1e293b; padding: 15px; border-radius: 10px; }
        .logo-box img { width: 100%; height: auto; border-radius: 5px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
    <h1>My Logo Designs</h1>
    <div class="grid">
        <div class="logo-box"><img src="logo1.png" alt="Logo 1"></div>
        <div class="logo-box"><img src="logo2.png" alt="Logo 2"></div>
        <div class="logo-box"><img src="logo3.png" alt="Logo 3"></div>
    </div>
</body>
</html>
