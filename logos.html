!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logo Designs</title>
    <style>
        body { background: linear-gradient(135deg, #0b0f19, #1a3a2d); padding: 40px; color: white; font-family: sans-serif; }
        .back { color: #38bdf8; text-decoration: none; font-size: 18px; margin-bottom: 20px; display: inline-block; }
        h1 { text-align: center; margin-bottom: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card img { width: 100%; border-radius: 8px; border: 2px solid #38bdf8; display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← Back to home</a>
    <h1>My Logo Designs</h1>
    <div class="gallery">
        <div class="card"><img src="logo-01.png.png" alt="Logo"></div>
        <div class="card"><img src="logo-hablo.png.png" alt="Logo"></div>
        <div class="card"><img src="logo-auto.png.png" alt="Logo"></div>
        <div class="card"><img src="logo-aero.png.png" alt="Logo"></div>
        <div class="card"><img src="logo-food.png.png" alt="Logo"></div>
    </div>
</body>
</html>
