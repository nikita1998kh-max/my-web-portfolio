<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Логотипы</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0b0f19, #1a3a2d); 
            padding: 40px; 
            color: white; 
            font-family: sans-serif;
            margin: 0;
        }
        h1 { text-align: center; color: #38bdf8; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .card img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            border: 2px solid #38bdf8;
            display: block;
        }
        .back-link { color: #fff; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Назад на главную</a>
    <h1>Логотипы</h1>
    
    <div class="gallery">
        <div class="card"><img src="logo-01.png.png" alt="Логотип"></div>
        <div class="card"><img src="logo-hablo.png.png" alt="Логотип"></div>
        <div class="card"><img src="logo-auto.png.png" alt="Логотип"></div>
        <div class="card"><img src="logo-aero.png.png" alt="Логотип"></div>
        <div class="card"><img src="logo-food.png.png" alt="Логотип"></div>
    </div>
</body>
</html>
