<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Logo Gallery</title>
    <style>
        body { background: #0b0f19; color: #ffffff; font-family: sans-serif; padding: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: contain; border-radius: 8px; }
        h1 { text-align: center; color: #ffffff; }
    </style>
</head>
<body>
    <h1>My Logo Designs</h1>
    <div class="gallery">
        <div class="card"><img src="logo-01.png.png" alt="Logo 1"></div>
        <div class="card"><img src="logo-hablo.png.png" alt="Hablo Logo"></div>
        <div class="card"><img src="logo-auto.png.png" alt="Auto Logo"></div>
        <div class="card"><img src="logo-aero.png.png" alt="Aero Logo"></div>
        <div class="card"><img src="logo-food.png.png" alt="Food Logo"></div>
    </div>
</body>
</html>
