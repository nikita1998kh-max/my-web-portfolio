<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Logo Designs</title>
    <style>
        body { background: #0b0f19; color: #ffffff; font-family: sans-serif; padding: 40px; margin: 0; }
        h1 { text-align: center; margin-bottom: 40px; color: #ffffff; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card { 
            background: #1e293b; 
            height: 200px; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            color: rgba(255, 255, 255, 0.05); /* Very subtle text */
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            user-select: none;
        }
        
        .card::before {
            content: "LOGOS LOGOS LOGOS LOGOS LOGOS LOGOS LOGOS LOGOS LOGOS";
            position: absolute;
            text-align: center;
            width: 200%;
        }
    </style>
</head>
<body>
    <h1>My Logo Designs</h1>
    
    <div class="gallery">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</body>
</html>
