<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikita Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #fff;

            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
            url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        section {
            min-height: 100vh;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 7rem);
            margin: 0;
            font-weight: 900;
        }

        .subtitle {
            color: #3ae374;
            letter-spacing: 6px;
            margin: 10px 0;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 60px;
            font-weight: 900;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        .card {
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* 🔥 ВЫРЕЗАННЫЕ ЛОГО */
        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;

            background: transparent; /* убрали фон */
            padding: 10px;

            /* эффект вырезанного объекта */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));

            transform: rotate(-3deg);
            transition: 0.3s ease;
        }

        .card:hover img {
            transform: rotate(0deg) scale(1.1);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }

        .card h3 {
            margin-top: 15px;
        }

        .card p {
            color: #777;
        }

    </style>
</head>

<body>

<section>
    <div class="container">
        <h1>NIKITA</h1>
        <div class="subtitle">DEVELOPER & DESIGNER</div>
    </div>
</section>

<section>
    <div class="container">
        <h2 class="section-title">My Logos</h2>

        <div class="grid">

            <div class="card">
                <img src="logo-01.png" alt="logo 1">
                <h3>Premium</h3>
                <p>Corporate style</p>
            </div>

            <div class="card">
                <img src="logo-aero.png" alt="logo 2">
                <h3>Aero</h3>
                <p>Tech design</p>
            </div>

            <div class="card">
                <img src="logo-auto.png" alt="logo 3">
                <h3>Auto</h3>
                <p>Automotive</p>
            </div>

            <div class="card">
                <img src="logo-hablo.png" alt="logo 4">
                <h3>Hablo</h3>
                <p>Social</p>
            </div>

        </div>
    </div>
</section>

</body>
</html>
