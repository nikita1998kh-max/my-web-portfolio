<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikita | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            /* Цвет текста делаем чуть темнее для контраста на прозрачном фоне */
            color: #1d2124; 
        }

        /* --- ВОТ ЗДЕСЬ ИСПРАВЛЕНО: ПРОЗРАЧНЫЙ ФОН --- */
        body {
            /* Мы убрали плотный белый градиент. Теперь картинка видна четко. */
            background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1920&q=80');
            background-attachment: fixed; /* Фон не движется при скролле */
            background-size: cover;
            background-position: center;
            background-color: #fff; /* Резервный цвет, если картинка не загрузится */
        }

        /* Общие стили для секций */
        section {
            min-height: 100vh;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
        }

        /* Секция 1: Приветствие */
        .hero h1 { 
            font-size: 4rem; 
            margin: 0; 
            color: #000; 
            text-shadow: 0 2px 4px rgba(255,255,255,0.5); /* Легкая тень для читаемости */
        }
        .hero h2 { 
            font-size: 1.6rem; 
            color: #007BFF; 
            margin-top: 10px; 
            font-weight: 400; 
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }
        .hero p { 
            font-size: 1.25rem; 
            max-width: 700px; 
            line-height: 1.8; 
            margin: 30px auto; 
            color: #2d3436; 
            font-weight: 400;
        }

        /* --- ПРОЗРАЧНАЯ СЕТКА КАРТОЧЕК --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 50px;
            margin-top: 60px;
        }

        .card {
            background: transparent; /* Полная прозрачность карточек */
            border: none;
            text-align: center;
            transition: transform 0.3s ease;
            padding: 20px;
        }

        .card:hover { 
            transform: translateY(-10px); 
        }
        
        /* Стили для твоих логотипов */
        .card img { 
            width: 100%; 
            max-width: 220px; 
            height: auto; 
            margin-bottom: 25px; 
            border-radius: 12px;
            /* Добавляем легкую тень самим картинкам для объема */
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
        }

        .card h3 { 
            font-size: 1.5rem; 
            margin: 0 0 15px 0; 
            color: #000; 
        }
        .card p { 
            font-size: 1.05rem; 
            color: #2d3436; 
            line-height: 1.6;
            margin: 0;
        }

        /* Заголовки секций */
        h2.section-title { 
            font-size: 3rem; 
            margin-bottom: 60px; 
            color: #000;
        }
        h2.section-title::after {
            content: ''; 
            display: block; 
            width: 70px; 
            height: 5px; 
            background: #007BFF; 
            margin: 25px auto; 
            border-radius: 2px;
        }

        /* Подвал */
        footer { 
            padding: 80px 20px; 
            color: #636e72; 
            font-size: 1rem; 
            text-align: center;
            background: rgba(255, 255, 255, 0.1); /* Совсем легкий фон в самом низу */
        }
        
        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.8rem; }
            h2.section-title { font-size: 2.2rem; }
            .card img { max-width: 180px; }
        }
    </style>
</head>
<body>

    <section id="about" class="hero">
        <div class="container">
            <h1>Hi, I'm Nikita</h1>
            <h2>Web Developer &
