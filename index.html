<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikita Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            color: #ffffff;
            background-color: #050505;
        }

        /* ОСНОВНОЙ ФОН */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1920&q=80');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        section {
            min-height: 100vh;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        /* HERO */
        .hero h1 { font-size: 4.5rem; margin: 0; text-transform: uppercase; }
        .hero .subtitle { font-size: 1.1rem; color: #3ae374; margin: 15px 0; font-weight: 700; letter-spacing: 5px; }

        /* СТРЕЛКА */
        .scroll-arrow {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            color: #3ae374;
            text-decoration: none;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translate(-50%, 0);}
            40% {transform: translate(-50%, -10px);}
        }

        /* ЛОГОТИПЫ (УДАЛЕНИЕ ФОНА) */
        h2.section-title { font-size: 3rem; margin-bottom: 60px; text-transform: uppercase; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        .card {
            background: none !important; /* ЖЕСТКО УБРАЛ ФОН КАРТОЧКИ */
            border: none !important;
            box-shadow: none !important;
            padding: 0;
        }

        .card img { 
            width: auto; 
            max-width: 100%; 
            height: 180px; 
            object-fit: contain;
            /* Если на логотипе есть белый фон, эта строка ниже сделает его прозрачным */
            mix-blend-mode: lighten; 
        }

        .card h3 { font-size: 1.2rem; margin: 15px 0 5px; color: #ffffff; }
        .card p { font-size: 0.85rem; color: #888; }

        /* ОКНА ПРОЕКТОВ */
        .site-windows {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .site-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.3s;
        }

        .site-card:hover { border-color: #3ae374; background: rgba(58, 227, 116, 0.05); }

        .site-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: #3ae374;
            color: #000;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        footer { padding: 100px 0 40px; color: #444; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="container">
            <h1>Nikita Nick</h1>
            <div class="subtitle">DEVELOPER & DESIGNER</div>
        </div>
        <a href="#logos" class="scroll-arrow">↓</a>
    </section>

    <section id="logos">
        <div class="container">
            <h2 class="section-title">My Logos</h2>
            <div class="grid">
                <div class="card"><img src="logo-01.png.png" alt="L1"><h3>Premium</h3><p>Identity Concept</p></div>
                <div class="card"><img src="logo-aero.png.png" alt="L2"><h3>Aero</h3><p>Tech Style</p></div>
                <div class="card"><img src="logo-auto.png.png" alt="L3"><h3>Auto</h3><p>Power & Speed</p></div>
                <div class="card"><img src="logo-food.png.png" alt="L4"><h3>Food</h3><p>Gastro Brand</p></div>
                <div class="card"><img src="logo-hablo.png.png" alt="L5"><h3>Hablo</h3><p>Social Web</p></div>
            </div>
        </div>
        <a href="#projects" class="scroll-arrow">↓</a>
    </section>

    <section id="projects">
        <div class="container">
            <h2 class="section-title">Web Projects</h2>
            <div class="site-windows">
                <div class="site-card"><span>Coming Soon</span><div class="site-label">Office automation</div></div>
                <div class="site-card"><span>Coming Soon</span><div class="site-label">Blogger landing</div></div>
                <div class="site-card"><span>Coming Soon</span><div class="site-label">Corporate site</div></div>
            </div>
        </div>
    </section>

    <footer><p>&copy; 2026 NIKITA NICK. ALL RIGHTS RESERVED.</p></footer>

</body>
</html>
