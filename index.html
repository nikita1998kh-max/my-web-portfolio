<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikita Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            background-color: #000;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1920&q=80');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        section {
            min-height: 100vh;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            text-align: center;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 60px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        .card {
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        /* ИСПРАВЛЕННЫЙ БЛОК ДЛЯ ЛОГОТИПОВ */
        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            /* Убираем белый фон и рамки */
            background-color: transparent !important; 
            padding: 0; 
            margin-bottom: 20px;
            
            /* Магия CSS: убирает белый фон у картинок на черном фоне сайта */
            mix-blend-mode: screen; 
            filter: contrast(1.1); 
            
            transition: 0.3s;
        }

        .card h3 { font-size: 1.2rem; margin: 10px 0 5px; }
        .card p { font-size: 0.9rem; color: #777; }

        /* ПРОЕКТЫ */
        .web-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .project-link { text-decoration: none; color: inherit; }
        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: left;
            transition: 0.3s;
        }
        .project-card:hover { border-color: #3ae374; transform: translateY(-5px); }
        .tag { display: inline-block; background: #3ae374; color: #000; padding: 4px 12px; font-weight: 900; font-size: 0.7rem; border-radius: 4px; margin-bottom: 10px; }
        footer { padding: 80px 0 40px; color: #444; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<section id="logos">
    <div class="container">
        <h2 class="section-title">My Logos</h2>
        <div class="grid">
            <div class="card">
                <img src="logo-01.png" alt="Geometric animal logo">
                <h3>Premium</h3>
                <p>Corporate style concept</p>
            </div>
            <div class="card">
                <img src="logo-aero.png" alt="Aeroglide logo">
                <h3>Aero</h3>
                <p>Tech-focused design</p>
            </div>
            <div class="card">
                <img src="logo-auto.png" alt="Autoburst logo">
                <h3>Auto</h3>
                <p>Automotive identity</p>
            </div>
            <div class="card">
                <img src="logo-hablo.png" alt="Hablo logo">
                <h3>Hablo</h3>
                <p>Social platform style</p>
            </div>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 NIKITA. [span_1](start_span)ALL RIGHTS RESERVED.[span_1](end_span)</p>
</footer>

</body>
</html>
