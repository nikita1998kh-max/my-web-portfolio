<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Портфолио Дизайнера</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; background: #0f172a; color: white; margin: 0; padding: 40px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; margin-bottom: 50px; }
        
        .section-title { margin: 40px 0 20px; border-left: 5px solid #38bdf8; padding-left: 15px; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .work-card { background: #1e293b; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .work-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        .work-card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        .btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мои профессиональные работы</h1>

        <h2 class="section-title">Дизайн афиш</h2>
        <div class="portfolio-grid">
            <div class="work-card">
                <img src="ССЫЛКА_НА_АФИШУ" alt="Афиша">
                <div class="info">
                    <h3>Название концерта/события</h3>
                    <p>Дизайн афиши для музыкального мероприятия.</p>
                </div>
            </div>
        </div>

        <h2 class="section-title">Бизнес-сайты</h2>
        <div class="portfolio-grid">
            <div class="work-card">
                <div class="info">
                    <h3>Название бизнеса</h3>
                    <p>Разработка лендинга под ключ: дизайн + верстка.</p>
                    <a href="ССЫЛКА_НА_САЙТ" class="btn" target="_blank">Перейти на сайт</a>
                </div>
            </div>
        </div>

        <h2 class="section-title">Разработка логотипов</h2>
        <div class="portfolio-grid">
            <div class="work-card">
                <img src="ССЫЛКА_НА_ЛОГО" alt="Логотип">
                <div class="info">
                    <h3>Бренд "Название"</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
